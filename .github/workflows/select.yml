# Option B, Stage 1.5 — full-text fetch for the SELECTED shortlist.
#
# Routine A (ROUTINE_PROMPT_A.md) reads feeds/digest.json + TASTE.md and
# writes ONLY selections/<date>.json (story ids + structure, no prose), then
# pushes it to its claude/** branch. THIS workflow fires on that push, runs
# scripts/fetch_selected.py to fetch full article text for every selected id,
# and commits the result — feeds/selected/<date>.json — to main, so Routine B
# (which clones main) can read it.
#
# This workflow intentionally does NOT touch drafts/** or site/**, so it never
# triggers publish.yml (which watches exactly those two path globs). See the
# "Confirm no overlap with publish.yml" note in OPTION_B_NOTES.md.
#
# Additive/parallel to the existing single-routine flow: fetch.yml, publish.yml,
# and taste.yml are untouched.

name: Select — Full-text fetch (Option B)

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'selections/**'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD) to process, defaults to every changed selections/*.json in the last commit.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write   # health-issue-on-failure, mirrors fetch.yml's A6 pattern

jobs:
  fetch_selected:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routine branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history so `git checkout origin/main -- feeds/refs` and the changed-file diff both work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # trafilatura/readability-lxml/certifi: reused from enrich_shortlist.py
        # (scripts/fetch_selected.py imports its fetch_extract directly).
        run: pip install trafilatura readability-lxml certifi

      - name: Pull today's refs snapshot from main
        # The routine branch only carries selections/<date>.json — it doesn't
        # necessarily have an up-to-date feeds/refs/ (that's produced by
        # fetch.yml on main). Bring just that directory over so
        # fetch_selected.py can resolve ids -> urls, without switching branches.
        run: |
          git fetch origin main
          git checkout origin/main -- feeds/refs || true

      - name: Determine which date(s) changed
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "dates=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            DATES=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" -- 'selections/' \
              | grep -E 'selections/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$' \
              | sed -E 's#selections/([0-9-]+)\.json#\1#' | sort -u | tr '\n' ' ')
            if [ -z "$DATES" ]; then
              # workflow_dispatch with no input and no matching diff (e.g. manual
              # re-run) — fall back to today's UTC date.
              DATES=$(date -u +%Y-%m-%d)
            fi
            echo "dates=$DATES" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch full text for each selected date
        id: fetch
        run: |
          set +e
          FAILED=0
          for d in ${{ steps.changed.outputs.dates }}; do
            echo "::group::fetch_selected for $d"
            python scripts/fetch_selected.py "$d"
            rc=$?
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then FAILED=1; fi
          done
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          exit 0   # never fail the job here — the health-issue step below decides

      - name: Checkout main for commit
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Commit feeds/selected/<date>.json to main
        run: |
          mkdir -p main-branch/feeds/selected
          for d in ${{ steps.changed.outputs.dates }}; do
            src="feeds/selected/$d.json"
            if [ -f "$src" ]; then
              cp "$src" "main-branch/feeds/selected/$d.json"
            fi
          done
          cd main-branch
          git config user.name  "Daily Cactus Bot"
          git config user.email "bot@dailycactus.local"
          git add feeds/selected/
          # NB: must be if/else, not two chained `git diff --staged` tests. The
          # commit consumes the staged changes, so a second `--quiet` check then
          # reports "clean" and short-circuits the push away — that bug silently
          # dropped the 2026-07-18 full-text file (committed on the runner, never
          # pushed), forcing Routine B onto its digest.json fallback.
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Full-text fetch for $(echo ${{ steps.changed.outputs.dates }} | tr ' ' ',')"
            git push
            echo "Pushed feeds/selected to main."
          fi

      - name: Open a health issue on fetch failure
        if: always() && steps.fetch.outputs.failed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily Cactus select.yml health: ${new Date().toISOString().slice(0,10)}`;
            const body = [
              'scripts/fetch_selected.py returned non-zero for at least one date.',
              'See the Actions run log for details.',
              'A placeholder feeds/selected/<date>.json may still have been written',
              '(empty stories map) — Routine B\'s GUARD falls back to feeds/digest.json',
              'in that case, so today\'s paper should not be broken, only degraded.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health'],
            });
