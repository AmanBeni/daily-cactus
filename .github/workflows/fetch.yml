# Fetches all RSS/Atom feeds on GitHub's runners (full internet, no sandbox
# proxy) and commits feeds/latest.json into the repo. The routine then READS
# feeds/digest.json instead of fetching anything itself — sidestepping the
# cloud sandbox's network allowlist entirely.
#
# TIMING: this must finish BEFORE your newsletter routine runs. The cron below
# is set ~1 hour ahead. GitHub cron is best-effort and can lag a few minutes,
# so keep a comfortable gap between this and the routine's schedule.

name: Fetch RSS Feeds

on:
  schedule:
    # 23:30 UTC == 05:00 AM IST. Routine is assumed ~06:00 AM IST.
    - cron: '30 23 * * *'
  workflow_dispatch:   # lets you click "Run workflow" to test on demand

permissions:
  contents: write
  issues: write   # A6: health-check issue on failure/empty digest

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # trafilatura/readability-lxml/certifi: B1 full-text enrichment step
        # (invoked from build_digest.py). requests/lxml come in as transitive
        # deps of trafilatura.
        run: pip install feedparser pyyaml trafilatura readability-lxml certifi

      - name: Fetch feeds
        id: fetch
        run: python scripts/fetch_feeds.py

      - name: Fetch opportunities (Unstop, 10times, Luma, Devpost)
        # P7: real event/opportunity sources -> feeds/opportunities.json,
        # merged into the 'opportunities' section by build_digest.py below.
        # These are mostly undocumented endpoints that WILL break eventually —
        # each source fails independently and this step never blocks the rest
        # of the pipeline (build_digest degrades gracefully if the file is
        # missing/empty; see merge_opportunities_feed).
        run: python scripts/fetch_opportunities.py || echo "fetch_opportunities failed, continuing"

      - name: Build lean digest (dedup, rank, shortlist, enrich)
        # Turns the raw ~500-story latest.json into feeds/digest.json (the
        # small, url/image-free file the routine reads) + per-date
        # feeds/refs/<date>.json + feeds/refs.json (legacy rolling union).
        # This is the main token-saving step: all dedup/ranking/trimming/
        # enrichment happens here on free runners, not in the token-billed
        # routine. Order: dedup -> rank -> shortlist -> enrich (see A4/A5/B1/B2
        # in scripts/build_digest.py).
        id: digest
        run: python scripts/build_digest.py | tee digest_output.log

      - name: Markets snapshot
        # B5 — zero-token; assemble_edition.py injects this verbatim later.
        # Never blocks the pipeline: a market-fetch failure just means no
        # markets bar today (edition.markets is optional).
        run: python scripts/fetch_markets.py || echo "markets fetch failed, continuing"

      - name: Commit feeds
        run: |
          git config user.name  "Daily Cactus Bot"
          git config user.email "bot@dailycactus.local"
          git add feeds/latest.json feeds/digest.json feeds/digest_lean.json feeds/refs.json feeds/refs/ feeds/markets.json feeds/feed_stats.jsonl feeds/opportunities.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Fetch feeds $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Health check — flag a broken or empty digest
        # A6: never let a thin/broken paper fail silently. Fires on a build_digest
        # non-zero exit (only reached if it hit the outer except-and-reraise) OR
        # the "DIGEST_EMPTY" marker it prints when zero candidates survived.
        if: always()
        run: |
          if [ "${{ steps.digest.outcome }}" = "failure" ] || grep -q "DIGEST_EMPTY" digest_output.log; then
            echo "DIGEST_BROKEN=1" >> "$GITHUB_ENV"
          fi

      - name: Open a health issue
        if: always() && (steps.fetch.outcome == 'failure' || env.DIGEST_BROKEN == '1')
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Daily Cactus fetch health: ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `fetch step outcome: ${{ toJSON(steps.fetch.outcome) }}`,
              `digest step outcome: ${{ toJSON(steps.digest.outcome) }}`,
              `digest empty/broken flag: ${process.env.DIGEST_BROKEN || '0'}`,
              '',
              'See the Actions run log for details. The paper may be thin or missing today.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health'],
            });
