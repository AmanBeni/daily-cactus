# Publishes the routine's output to GitHub Pages.
#
# In v4 the routine no longer writes the full edition JSON. It writes a tiny
# DRAFT (drafts/YYYY-MM-DD.json) of story IDs + the prose it wrote. This
# workflow expands that draft into the full site/editions/YYYY-MM-DD.json
# (injecting url/image/source verbatim from feeds/refs.json) and THEN deploys
# site/ to gh-pages. Doing the expansion here — on free runners — keeps the
# model's output tiny and makes fabricated urls structurally impossible.
#
# Routines push to claude/* branches by default; we also accept main.

name: Publish Daily Cactus

on:
  push:
    branches:
      - 'claude/**'
      - 'main'
    paths:
      - 'drafts/**'
      - 'site/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout routine branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Assemble edition(s) from draft(s)
        # Expands every drafts/*.json into site/editions/*.json. Fails loudly on
        # malformed JSON so a broken paper is never deployed.
        run: python scripts/assemble_edition.py

      - name: Deploy site/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true          # keep past editions/*.json across deploys
          commit_message: "Publish edition from ${{ github.ref_name }}"
