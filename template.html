<!DOCTYPE html>
<!--
  The Daily Cactus — master template (v2).
  The routine reproduces this structure/styling exactly each edition.
  Placeholders: {{DATE}} {{EDITION_NO}} {{NAV}} {{LEAD}} {{GRID}} {{COLOPHON}}
  Section pages reuse the same <head>, masthead, nav, .grid, and colophon.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Cactus — {{DATE}}</title>
<style>
  :root{
    --paper:#faf6ee; --ink:#1d1d1b; --muted:#6b675e;
    --accent:#2f6f4f; --rule:#d8d2c4; --highlight:#b3542e; --beta:#7a5cc4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
       font-family:Georgia,'Times New Roman',serif;line-height:1.55;
       max-width:1600px;margin:0 auto;padding:24px 24px 64px}
  /* Masthead */
  .masthead{text-align:center;border-bottom:3px double var(--ink);padding-bottom:14px}
  .masthead h1{font-size:clamp(36px,7vw,60px);letter-spacing:1px;font-weight:700}
  .masthead .dateline{font-family:'Courier New',monospace;font-size:13px;
       color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:6px}
  /* Nav with · separators */
  nav{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;
      padding:12px 0;border-bottom:1px solid var(--rule);
      font-family:'Courier New',monospace;font-size:13px;line-height:2}
  nav a{color:var(--ink);text-decoration:none;text-transform:uppercase;letter-spacing:1px}
  nav a:hover,nav a.active{color:var(--accent);text-decoration:underline}
  nav .sep{color:var(--rule);margin:0 12px;user-select:none}
  /* Lead story (front page only) */
  .lead{padding:24px 0 8px;border-bottom:1px solid var(--rule)}
  .lead .story-img{float:right;width:300px;height:200px;object-fit:cover;
       margin:4px 0 12px 22px;border:1px solid var(--rule);border-radius:4px;background:#ece6d8}
  .lead h2{font-size:30px;line-height:1.2;margin-bottom:10px}
  .lead .summary{font-size:17px}
  /* Keep the lead's body text at a readable measure on wide monitors
     (the big headline still spans full width; only the prose is capped). */
  .lead .summary,.lead .takeaway,.lead .why{max-width:74ch}
  /* Two-column grid (front page + section pages); collapses on mobile */
  /* Auto-fitting columns: fills the available width with as many ~400px columns
     as fit. ~2 on a laptop, 3-4 on a monitor — no dead space, no over-long lines. */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
        column-gap:40px;margin-top:8px}
  .section-title{grid-column:1 / -1;font-size:20px;margin:30px 0 2px;color:var(--accent);
       border-bottom:1px solid var(--rule);padding-bottom:4px;
       text-transform:uppercase;letter-spacing:2px;font-family:'Courier New',monospace}
  /* Story block */
  article{padding:18px 0;border-bottom:1px solid var(--rule);overflow:hidden}
  article h2{font-size:20px;line-height:1.3;margin-bottom:6px}
  article h2 a{color:var(--ink);text-decoration:none}
  article h2 a:hover{color:var(--accent)}
  .story-img{float:right;width:128px;height:88px;object-fit:cover;
       margin:2px 0 8px 14px;border:1px solid var(--rule);border-radius:4px;background:#ece6d8}
  .summary{margin-bottom:8px}
  .takeaway{margin-bottom:6px;font-size:15px}
  .takeaway b{color:var(--highlight);letter-spacing:.3px}
  .why{background:#f1ead9;border-left:3px solid var(--accent);
       padding:8px 12px;font-size:15px;margin-bottom:8px}
  .why b{color:var(--accent)}
  .meta{font-family:'Courier New',monospace;font-size:12px;color:var(--muted)}
  .meta a{color:var(--highlight)}
  .developing{display:inline-block;background:var(--highlight);color:#fff;
       font-family:'Courier New',monospace;font-size:11px;padding:1px 7px;
       border-radius:3px;margin-bottom:6px;letter-spacing:1px}
  /* Opportunities (beta) */
  .beta-tag{display:inline-block;background:var(--beta);color:#fff;
       font-family:'Courier New',monospace;font-size:11px;padding:1px 7px;
       border-radius:3px;letter-spacing:1px;vertical-align:middle;margin-left:8px}
  .beta-note{grid-column:1 / -1;font-size:13px;color:var(--muted);font-style:italic;
       margin:2px 0 4px}
  .opp h2{font-size:18px}
  .opp .when{font-family:'Courier New',monospace;font-size:12px;color:var(--beta);
       margin-bottom:4px;letter-spacing:.5px}
  /* Archive index */
  .archive-list{list-style:none;margin-top:14px}
  .archive-list li{padding:9px 0;border-bottom:1px solid var(--rule)}
  .archive-list .d{font-family:'Courier New',monospace;color:var(--muted);
       font-size:13px;margin-right:10px}
  .archive-list a{color:var(--ink);text-decoration:none}
  .archive-list a:hover{color:var(--accent)}
  /* Colophon */
  .colophon{margin-top:46px;padding-top:12px;border-top:3px double var(--ink);
       text-align:center;font-family:'Courier New',monospace;
       font-size:12px;color:var(--muted)}
  /* Mobile: single column, tighter */
  @media (max-width:760px){
    body{padding:18px 16px 48px}
    .grid{grid-template-columns:1fr;column-gap:0}
    .lead .story-img{float:none;width:100%;height:200px;margin:0 0 12px 0}
    .lead h2{font-size:25px}
    .story-img{width:96px;height:68px;margin-left:10px}
    nav .sep{margin:0 8px}
  }
</style>
</head>
<body>
