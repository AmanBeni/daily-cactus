<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Cactus 🌵</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="masthead">
    <h1>The Daily Cactus 🌵</h1>
    <div class="dateline" id="dateline">Loading…</div>
  </header>

  <div class="datebar" id="datebar" style="visibility:hidden">
    <label for="datepick">Edition:</label>
    <select id="datepick" aria-label="Choose edition date"></select>
  </div>

  <nav id="nav"></nav>

  <main id="paper"><p class="status">Loading the latest edition…</p></main>

  <footer class="colophon" id="colophon"></footer>

  <script src="app.js"></script>
</body>
</html>
