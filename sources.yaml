# The Daily Cactus — Source Registry  (v4)
# Edit freely. The fetcher (scripts/fetch_feeds.py) reads this every run.
#
# VERIFICATION STATUS:
#   [OK]/[VERIFIED] confirmed working   [TRY] plausible, may 403   [GNEWS] Google News RSS query
#
# DESIGN (v4): prefer FEWER, RICHER Google-News queries per section (high recall via
# broad OR-term lists) and let scripts/build_digest.py rank + dedupe + diversify the
# pool down to the cap. One rich query beats many narrow overlapping ones. Multiple
# queries are kept only where genuinely distinct (Other Interests, Opportunities &
# Events tiers).
#
# IMPORTANT: a section's `window_hours` MUST be >= the largest `when:Nd` in its
# queries (Nd*24), or fetch_feeds will trim those results before the editor sees them.
# `when:Nd` = last N days. Region pinned to India (hl=en-IN&gl=IN&ceid=IN:en).

sections:

  - name: "AI"
    slug: ai
    max_stories: 10       # owner's main domain — raised 6->10 (Jul 2026)
    window_hours: 72
    angle: "Capabilities, research, industry moves, India AI policy & tools. Separate substance from press releases."
    feeds:
      - https://www.technologyreview.com/topic/artificial-intelligence/feed   # [OK]
      - https://techcrunch.com/category/artificial-intelligence/feed/          # [VERIFIED]
      # analyticsindiamag.com/feed dropped (Jul 2026 B7 audit): parse failure,
      # confirmed dead — no valid entries returned.
      - https://importai.substack.com/feed                                     # [VERIFIED] Jul 2026 — works now, despite HANDOFF's old "flaky" note
      - https://news.google.com/rss/search?q=(%22artificial+intelligence%22+OR+AI+OR+%22machine+learning%22+OR+OpenAI+OR+Anthropic+OR+DeepMind)+(India+OR+research+OR+breakthrough+OR+launch+OR+policy+OR+funding+OR+regulation+OR+acquisition)+when:3d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Deep Tech"
    slug: deep-tech
    max_stories: 6        # +1 (Jul 2026 breadth raise); India-specific deep tech
                          # now has its own section below
    window_hours: 72
    angle: "Semiconductors, space, robotics, drones/defence tech, quantum, advanced materials. Engineering reality over vaporware."
    feeds:
      - https://spectrum.ieee.org/feeds/feed.rss          # [OK]
      - https://arstechnica.com/science/feed/             # [OK]
      - https://www.quantamagazine.org/feed/              # [OK]
      - https://www.theguardian.com/technology/rss        # [VERIFIED]
      - https://www.scmp.com/rss/36/feed                  # [VERIFIED] Asia tech
      - https://news.google.com/rss/search?q=(semiconductor+OR+robotics+OR+drones+OR+UAV+OR+%22defence+tech%22+OR+%22advanced+materials%22+OR+quantum+OR+spacetech+OR+ISRO+OR+%22humanoid+robot%22+OR+fusion+OR+photonics)+when:3d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] strategic + frontier

  - name: "Climate & Energy"
    slug: climate-energy
    max_stories: 7        # +1 (Jul 2026 breadth raise)
    window_hours: 72
    angle: "Energy transition, grids, climate science & adaptation, carbon markets, biodiversity, water. India angle is gold."
    feeds:
      - https://www.carbonbrief.org/feed/                 # [OK]
      - https://www.canarymedia.com/rss                   # [OK]
      - https://www.theguardian.com/environment/rss       # [VERIFIED]
      - https://news.google.com/rss/search?q=(solar+OR+EV+OR+%22green+hydrogen%22+OR+%22renewable+energy%22+OR+%22energy+storage%22+OR+%22carbon+market%22+OR+%22climate+adaptation%22+OR+%22water+scarcity%22+OR+biodiversity+OR+IPCC+OR+%22extreme+weather%22)+(India+OR+study+OR+report)+when:3d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Health Tech"
    slug: health-tech
    max_stories: 5        # +1 (Jul 2026 breadth raise)
    window_hours: 96
    angle: "Digital health, biotech, devices, drug discovery. Deployment and evidence over lab hype."
    feeds:
      - https://www.statnews.com/feed/                    # [OK]
      - https://www.fiercebiotech.com/rss/xml             # [OK]
      - https://news.google.com/rss/search?q=(%22health+tech%22+OR+%22digital+health%22+OR+telemedicine+OR+medtech+OR+pharma+OR+%22drug+discovery%22+OR+%22clinical+trial%22+OR+CRISPR+OR+mRNA+OR+immunotherapy)+(India+OR+research)+when:4d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Agritech"
    slug: agritech
    max_stories: 6        # raised 4->6 (Jul 2026 — the "only two articles" fix)
    window_hours: 96
    angle: "India-first farm tech, food security, alt-proteins, regenerative & precision agriculture. Deployment over demos."
    feeds:
      - https://agfundernews.com/feed                     # [OK]
      - https://news.mongabay.com/feed/                   # [VERIFIED] nature/agri
      - https://www.downtoearth.org.in/rss/agriculture    # [TRY] India agri policy/ground reports
      - https://news.google.com/rss/search?q=(agritech+OR+foodtech+OR+%22agri+fintech%22+OR+%22food+security%22+OR+%22alternative+protein%22+OR+%22regenerative+agriculture%22+OR+%22precision+agriculture%22+OR+FPO)+India+when:4d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Indian Startups"
    slug: indian-startups
    max_stories: 9        # owner's working arena — raised 6->9 (Jul 2026)
    window_hours: 48
    angle: "Funding, M&A, IPOs, shutdowns, regulation, VC theses, D2C/quick-commerce. Numbers over narratives."
    feeds:
      - https://inc42.com/feed/                           # [OK]
      - https://yourstory.com/feed                        # [OK]
      # entrackr.com/feed dropped (Jul 2026 B7 audit): 404, confirmed dead.
      - https://the-ken.com/feed/                         # [VERIFIED] Jul 2026 — works now, despite old "likely paywalled" note
      - https://restofworld.org/feed/latest/               # [VERIFIED] Jul 2026 — B7 replacement, global emerging-market tech/venture angle
      - https://news.google.com/rss/search?q=(startup+OR+unicorn+OR+founder+OR+%22venture+capital%22+OR+%22seed+funding%22+OR+D2C+OR+%22quick+commerce%22)+(funding+OR+raises+OR+acquires+OR+IPO+OR+shuts+OR+%22lays+off%22+OR+%22Series+A%22+OR+SEBI+OR+RBI+OR+MeitY+OR+DPIIT)+India+when:2d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "India Deep Tech"
    slug: india-deep-tech
    max_stories: 6
    window_hours: 96
    angle: "NEW (Jul 2026). Indian deep-tech startups & ecosystem — space, defence, drones, semiconductors, robotics, quantum, climate hardware, biomanufacturing. Funding, iDEX/IN-SPACe/DRDO-ISRO tie-ups, production milestones, policy. The owner wants to WORK in this ecosystem: who's building, who's hiring, who just got funded matters. Deployment and hardware reality over press releases."
    feeds:
      - https://inc42.com/industry/deeptech/feed/         # [TRY] Inc42 deeptech vertical
      - https://news.google.com/rss/search?q=(%22deep+tech%22+OR+deeptech+OR+spacetech+OR+%22defence+startup%22+OR+%22space+startup%22+OR+semiconductor+OR+robotics+OR+drone+OR+quantum)+(startup+OR+raises+OR+funding+OR+iDEX+OR+%22IN-SPACe%22+OR+ISRO+OR+DRDO)+India+when:4d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] India deep-tech startups
      - https://news.google.com/rss/search?q=(Agnikul+OR+Skyroot+OR+Pixxel+OR+%22ideaForge%22+OR+Tonbo+OR+%22Bellatrix%22+OR+Sarvam+OR+%22Mindgrove%22+OR+InCore+OR+QNu+OR+Digantara+OR+GalaxEye)+when:7d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] named Indian deep-tech companies (edit this roster freely)

  - name: "Global Economics"
    slug: global-economics
    max_stories: 6        # +1 (Jul 2026 breadth raise)
    window_hours: 48
    angle: "Macro, trade, markets, central banks, geopolitics, supply chains. What it means for India and tech."
    feeds:
      - https://feeds.bloomberg.com/economics/news.rss    # [OK]
      - https://www.economist.com/finance-and-economics/rss.xml  # [OK]
      - https://www.theguardian.com/business/rss          # [VERIFIED]
      - https://feeds.hbr.org/harvardbusiness             # [VERIFIED] strategy lens
      - https://news.google.com/rss/search?q=(Fed+OR+RBI+OR+tariff+OR+%22trade+war%22+OR+recession+OR+%22interest+rate%22+OR+%22central+bank%22+OR+geopolitics+OR+%22supply+chain%22)+when:2d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "India"
    slug: india
    max_stories: 6        # +1 (Jul 2026 breadth raise)
    angle: "Top national news + digital public infrastructure (UPI/ONDC/Aadhaar). Policy and economy over politics-as-soap-opera."
    feeds:
      - https://www.thehindu.com/news/national/feeder/default.rss  # [OK]
      - https://indianexpress.com/section/india/feed/     # [OK]
      - https://news.google.com/rss/search?q=India+(economy+OR+policy+OR+infrastructure+OR+trade+OR+diplomacy+OR+UPI+OR+ONDC+OR+Aadhaar+OR+%22digital+public+infrastructure%22)+when:1d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "World"
    slug: world
    max_stories: 5
    angle: "Top global headlines only. The handful of things a well-informed person should know today."
    feeds:
      - https://feeds.bbci.co.uk/news/world/rss.xml       # [OK]
      - https://www.theguardian.com/world/rss             # [VERIFIED]
      - https://www.scmp.com/rss/5/feed                   # [VERIFIED] Asia angle
      - https://news.google.com/rss/search?q=world+news+when:1d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Other Interests"
    slug: other-interests
    max_stories: 5
    window_hours: 336   # 14 days — covers the India-tour query; culture isn't breaking
                        # and the reader checks the paper only a few days a week.
    angle: "Music (all kinds), live events, neuroscience, the natural world, books, big ideas. One genuinely interesting thing beats three mediocre ones."
    feeds:
      - https://www.quantamagazine.org/tag/neuroscience/feed/  # [OK] neuroscience
      - https://www.newscientist.com/feed/home/           # [VERIFIED] science
      - https://bookriot.com/feed/                        # [OK] books
      - https://pitchfork.com/rss/news/                   # [VERIFIED] music
      - https://news.mongabay.com/feed/                   # [VERIFIED] nature
      - https://www.nature.com/nature.rss                 # [TRY] may bot-block
      # General music (artist/album/tour news) — broad, the missing piece.
      - https://news.google.com/rss/search?q=(music+OR+album+OR+concert+OR+tour+OR+festival+OR+%22live+music%22+OR+band)+when:7d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] music
      # Artist-to-India tours/concerts (the "Fred again.. India tour" recall fix).
      - https://news.google.com/rss/search?q=(%22India+tour%22+OR+%22India+concert%22+OR+%22performs+in+India%22+OR+%22coming+to+India%22+OR+%22Delhi+concert%22+OR+%22Mumbai+concert%22+OR+%22Jaipur+festival%22)+when:14d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] India tours
      # Science & ideas (psychology dropped — pop-psych noise).
      - https://news.google.com/rss/search?q=(neuroscience+OR+astronomy+OR+archaeology+OR+%22particle+physics%22+OR+cosmology+OR+ecology+OR+%22evolutionary+biology%22+OR+paleontology)+when:4d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] science

  - name: "Opportunities & Events"
    slug: opportunities
    max_stories: 5
    beta: true
    window_hours: 1080   # 45 days — global must-attend events are announced far ahead.
    angle: "BETA. Events & opportunities worth showing up to / applying to, in THREE tiers: (1) NATIONAL India events that matter; (2) LOCAL — Jaipur + Delhi/NCR + nearby (0-4 great ones); (3) GLOBAL — only the creamiest, must-attend. Plus fellowships/cohorts/hackathons. Includes OFFLINE events (summits, expos, exhibitions, seminars, festivals, sport). Examples: G7 in India, Olympics, India Art Fair, Jaipur Literature Festival. Only list items with a concrete date AND a working link; label clearly as beta."
    feeds:
      # Tier 1a — national India events (generic)
      - https://news.google.com/rss/search?q=(summit+OR+conference+OR+expo+OR+conclave+OR+%22trade+fair%22+OR+convention)+India+when:30d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]
      # Tier 1b — national marquee, named (tech + culture)
      - https://news.google.com/rss/search?q=(%22Jaipur+Literature+Festival%22+OR+JLF+OR+%22Magnetic+Fields%22+OR+%22NH7+Weekender%22+OR+%22India+Art+Fair%22+OR+TechSparks+OR+Nasscom+OR+%22CII+summit%22+OR+%22FICCI%22)+when:30d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]
      # Tier 2 — local: Jaipur + Delhi/NCR + nearby
      - https://news.google.com/rss/search?q=(conference+OR+summit+OR+expo+OR+meetup+OR+festival+OR+exhibition+OR+workshop+OR+concert)+(Jaipur+OR+Delhi+OR+Gurugram+OR+Noida+OR+Rajasthan+OR+NCR)+when:21d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]
      # Tier 3 — global must-attend (named only)
      - https://news.google.com/rss/search?q=(Davos+OR+G7+OR+G20+OR+CES+OR+%22World+Economic+Forum%22+OR+Olympics+OR+%22FIFA+World+Cup%22+OR+Cannes+OR+%22Venice+Biennale%22+OR+%22Art+Basel%22)+when:45d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]
      # Fellowships / cohorts / hackathons
      - https://news.google.com/rss/search?q=(fellowship+OR+cohort+OR+accelerator+OR+%22open+call%22+OR+hackathon)+India+startup+when:21d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS]

  - name: "Beyond Your Beat"
    slug: beyond-your-beat
    max_stories: 3
    angle: "Broad top headlines so the editor can surface 1-3 genuinely important stories OUTSIDE the reader's usual domains (major sports, culture, world moments) that he'd regret missing. Not for stories already covered in other sections."
    feeds:
      - https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en   # [GNEWS] top stories (all topics)
      - https://news.google.com/rss/search?q=(cricket+OR+football+OR+Olympics+OR+tennis+OR+sports+OR+film+OR+award+OR+championship)+when:1d&hl=en-IN&gl=IN&ceid=IN:en  # [GNEWS] sports & culture

  - name: "Weekend Longform"
    slug: longform
    max_stories: 4
    weekend_only: true     # B6: fetched daily, but build_digest.py only includes
                            # it in the digest when today is Saturday (IST)
    window_hours: 168      # a week's worth — these are evergreen, not breaking
    angle: "One or two genuinely worth-20-minutes long reads. Verified feeds only (Jul 2026): Aeon, Guardian Long Read, Longreads, Nautilus."
    feeds:
      - https://aeon.co/feed.rss                                    # [VERIFIED] Jul 2026
      - https://www.theguardian.com/news/series/the-long-read/rss   # [VERIFIED] Jul 2026
      - https://longreads.com/feed/                                 # [VERIFIED] Jul 2026
      - https://nautil.us/feed/                                     # [VERIFIED] Jul 2026

  - name: "Remainder"
    slug: remainder
    max_stories: 4
    angle: "Catch-all for important stories that fit nowhere above. Editor's discretion."
    feeds: []
