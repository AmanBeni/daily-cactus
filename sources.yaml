# The Daily Cactus — Source Registry
# Edit freely. The routine re-reads this every morning.
# Feed URLs below are best-known as of June 2026 — on first run, the routine
# will report any dead feeds in the colophon; swap those out here.

sections:

  - name: "AI"
    slug: ai
    max_stories: 6
    angle: "Capabilities, research, and industry moves. Separate substance from press releases. Include an 'AI Tools & Releases' sub-block for notable product/tool launches."
    feeds:
      - https://www.anthropic.com/rss.xml
      - https://openai.com/news/rss.xml
      - https://deepmind.google/blog/rss.xml
      - https://www.technologyreview.com/topic/artificial-intelligence/feed
      - https://hnrss.org/frontpage?points=150   # high-signal HN; AI-filter editorially
      - https://importai.substack.com/feed

  - name: "Deep Tech"
    slug: deep-tech
    max_stories: 5
    angle: "Semiconductors, space, robotics, quantum, materials. Engineering reality over vaporware."
    feeds:
      - https://spectrum.ieee.org/feeds/feed.rss
      - https://arstechnica.com/science/feed/
      - https://www.quantamagazine.org/feed/

  - name: "Climate & Energy"
    slug: climate-energy
    max_stories: 6
    angle: "Climate science, energy transition, grids, policy. Merge climate + sustainability + energy/utilities; use sub-headers if needed. India angle is gold."
    feeds:
      - https://www.carbonbrief.org/feed/
      - https://www.canarymedia.com/rss
      - https://www.downtoearth.org.in/rss/climate-change
      - https://www.iea.org/api/rss/news.xml

  - name: "Health Tech"
    slug: health-tech
    max_stories: 4
    angle: "Digital health, biotech, devices, healthcare systems. Deployment and evidence over lab hype."
    feeds:
      - https://www.statnews.com/feed/
      - https://www.fiercebiotech.com/rss/xml
      - https://www.mobihealthnews.com/feed

  - name: "Agritech"
    slug: agritech
    max_stories: 4
    angle: "India-first. Farm tech, supply chains, climate-resilient agriculture. Deployment over demos."
    feeds:
      - https://agfundernews.com/feed
      - https://www.downtoearth.org.in/rss/agriculture

  - name: "Indian Startups"
    slug: indian-startups
    max_stories: 6
    angle: "Funding, pivots, policy, shutdowns. Entrackr-style skepticism — numbers over narratives."
    feeds:
      - https://entrackr.com/feed/
      - https://inc42.com/feed/
      - https://yourstory.com/feed

  - name: "Global Economics"
    slug: global-economics
    max_stories: 5
    angle: "Macro, trade, markets, central banks. What it means for India and for tech."
    feeds:
      - https://www.reuters.com/finance/markets/rss   # if dead, swap for Reuters business feed
      - https://www.economist.com/finance-and-economics/rss.xml
      - https://feeds.bloomberg.com/economics/news.rss

  - name: "India"
    slug: india
    max_stories: 5
    angle: "Top national news. Policy and economy over politics-as-soap-opera."
    feeds:
      - https://www.thehindu.com/news/national/feeder/default.rss
      - https://indianexpress.com/section/india/feed/

  - name: "World"
    slug: world
    max_stories: 5
    angle: "Top global headlines only. The 5 things a well-informed person should know today."
    feeds:
      - https://feeds.bbci.co.uk/news/world/rss.xml
      - https://www.reuters.com/world/rss
      - https://feeds.apnews.com/rss/apf-topnews

  - name: "Other Interests"
    slug: other-interests
    max_stories: 5
    angle: "Neuroscience, education, books, music (electronic/production world welcome), live events. One genuinely interesting thing beats three mediocre ones."
    feeds:
      - https://www.quantamagazine.org/tag/neuroscience/feed/
      - https://bookriot.com/feed/
      - https://ra.co/xml/rss_news.xml
      - https://www.nature.com/subjects/neuroscience.rss

  - name: "Remainder"
    slug: remainder
    max_stories: 4
    angle: "Catch-all for important stories that fit nowhere above. Editor's discretion."
    feeds: []   # populated editorially from leftovers across all feeds
